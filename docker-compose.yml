services:

  mysql:

    image: mysql:8.0

    container_name: mysql-container

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_DATABASE: firstapi

    ports:

      - "3307:3306"

    volumes:

      - mysql-data:/var/lib/mysql

  firstapi:

    build: .

    container_name: firstapi-container

    restart: always

    depends_on:
      - mysql

    ports:

      - "8080:8080"

    environment:

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/firstapi
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql123

volumes:

  mysql-data: